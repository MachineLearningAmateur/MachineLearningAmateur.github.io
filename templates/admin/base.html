<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <meta name="description" content="Local authoring interface for James Z.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    >
    <script>
      (() => {
        const storageKey = "site-theme";
        let theme = "light";

        try {
          const storedTheme = localStorage.getItem(storageKey);
          if (storedTheme === "light" || storedTheme === "dark") {
            theme = storedTheme;
          } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        } catch (error) {
          if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
            theme = "dark";
          }
        }

        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/assets/css/site.css">
    <script src="/assets/js/theme.js" defer></script>
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-frame site-header__inner">
          <a class="site-mark" href="{{ url_for('admin_index') }}" aria-label="Authoring dashboard">
            <span class="site-mark__name">James Z / Admin</span>
          </a>
          <div class="site-header__actions">
            <nav class="site-nav" aria-label="Authoring">
              <a class="site-nav__link{% if request.endpoint == 'admin_index' %} site-nav__link--active{% endif %}" href="{{ url_for('admin_index') }}">Dashboard</a>
              <a class="site-nav__link{% if request.endpoint == 'create_entry' %} site-nav__link--active{% endif %}" href="{{ url_for('create_entry') }}">New Entry</a>
            </nav>
            <button
              class="theme-toggle"
              type="button"
              aria-label="Switch to dark theme"
              aria-pressed="false"
              data-theme-toggle
            >
              <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M21 14.2A8.7 8.7 0 0 1 9.8 3a.75.75 0 0 0-.82.19A9.75 9.75 0 1 0 20.8 15a.75.75 0 0 0 .2-.8Z"/>
              </svg>

.45-7.71-7.71 0-4.26 3.45-7.71 7.71-7.71h19.75c4.26 0 7.71 3.45 7.71 7.71 0 4.26-3.45 7.71-7.71 7.71ZM19.72 69.13c-3.67-2.11-4.94-6.8-2.83-10.48 2.11-3.67 6.8-4.94 10.48-2.83l17.1 9.88c3.67 2.11 4.94 6.8 2.83 10.48-2.11 3.67-6.8 4.94-10.48 2.83Z"/>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main class="site-frame admin-page">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
        <div class="flash-stack">
            {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
