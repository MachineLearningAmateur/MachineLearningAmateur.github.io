<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <meta name="description" content="Local authoring interface for James Z.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,500;6..72,700&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.2.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/site.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="site-header">
        <div class="site-frame site-header__inner">
          <a class="site-mark" href="{{ url_for('admin_index') }}" aria-label="Authoring dashboard">
            <span class="site-mark__name">Admin</span>
          </a>
          <div class="site-header__actions">
            <nav class="site-nav" aria-label="Authoring">
              <a class="site-nav__link{% if request.endpoint == 'admin_index' %} site-nav__link--active{% endif %}" href="{{ url_for('admin_index') }}">Dashboard</a>
              <a class="site-nav__link{% if request.endpoint == 'create_entry' %} site-nav__link--active{% endif %}" href="{{ url_for('create_entry') }}">New Entry</a>
            </nav>
          </div>
        </div>
      </header>

      <main class="site-frame admin-page">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
        <div class="flash-stack">
            {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
