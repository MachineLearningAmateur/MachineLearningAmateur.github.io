{% extends "site/base.html" %}

{% block content %}
      <main class="post-shell">
        <header class="post-header">
          <h1 class="post-title">{{ entry.title }}</h1>
          <p class="post-meta">{{ entry.display_date_long }} - {{ entry.read_minutes }} min read</p>
        </header>

        <article class="post-body">
          {{ entry.body_html | safe }}
        </article>

        <nav class="post-nav">
          <a class="text-link" href="/{{ entry.entry_type }}/">Back to {{ entry.section_label }}</a>
        </nav>
      </main>
{% endblock %}
